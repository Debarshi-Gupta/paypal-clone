# Application Configuration
spring.application.name=user-service
server.port = 8081

# Database connection
spring.datasource.url=jdbc:postgresql://localhost:5432/paypal
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Format SQL (optional, for readability)
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret
jwt.secret=mysupersecuresecretkeythatisatleast32characterising
jwt.expiration=86400000

# Admin Secret
admin.secret.key=mysupersecuresecretadminkeythatisatleast16characterising

# Wallet Service
wallet.service.url=http://localhost:8083