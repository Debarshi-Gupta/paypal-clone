# =========================
# Application Configuration
# =========================

spring.application.name=transaction-service
server.port = 8082

# =========================
# Database Configuration
# =========================

spring.datasource.url=jdbc:postgresql://localhost:5432/paypal
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

# =========================
# JWT Configuration
# =========================

jwt.secret=mysupersecuresecretkeythatisatleast32characterising
jwt.expiration=86400000

# =========================
# External Service Configuration
# =========================

user.service.url=http://localhost:8081
wallet.service.url=http://localhost:8083

# =========================
# Kafka Configuration
# =========================

spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true

spring.kafka.consumer.group-id=transaction-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

kafka.topic.transaction.created=transaction.created
